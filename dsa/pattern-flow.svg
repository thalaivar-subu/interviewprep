<svg viewBox="0 0 1180 850" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, Segoe UI, Roboto, sans-serif" role="img">
  <title>DSA pattern decision flowchart</title>
  <desc>Branch on the input structure, then the constraint, to reach the algorithm pattern. Hints below cover the confusing splits.</desc>
  <defs>
    <marker id="arw" markerWidth="7" markerHeight="7" refX="5.5" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#8a8f98"/>
    </marker>
    <style>
      .title{fill:#1a1a1a;font-weight:700;}
      .sub{fill:#6b7280;}
      .phdr{fill:#2563eb;font-weight:700;letter-spacing:.3px;}
      .cat{fill:#eef1f5;stroke:#c3c9d2;stroke-width:1;}
      .catlab{fill:#1a1a1a;font-weight:700;font-size:12px;}
      .kw{fill:#4b5563;font-size:11.5px;}
      .pill{fill:#ffffff;stroke:#2563eb;stroke-width:1.5;}
      .pillt{fill:#1a1a1a;font-weight:600;font-size:12px;}
      .edge{stroke:#c3c9d2;stroke-width:1.3;fill:none;}
      .arrow{stroke:#8a8f98;stroke-width:1.3;fill:none;}
      .hintbox{fill:#f7f8fa;stroke:#e2e5ea;stroke-width:1;}
      .hh{fill:#2563eb;font-weight:700;font-size:12.5px;}
      .ht{fill:#4b5563;font-size:12px;}
      .hk{fill:#1a1a1a;font-weight:600;font-size:12px;}
    </style>
  </defs>

  <text x="30" y="34" class="title" font-size="20">Pick the Pattern — 30-second decision flow</text>
  <text x="30" y="56" class="sub" font-size="12.5">Branch on STRUCTURE, then the CONSTRAINT. The goal word (longest / min / max / count) is a decoy — ignore it here.</text>

  <!-- ================= PANEL 1 ================= -->
  <text x="30" y="88" class="phdr" font-size="13">(1) WHAT STRUCTURE IS THE INPUT?</text>

  <rect class="cat" x="25" y="102" width="92" height="86" rx="6"/>
  <text x="71" y="149" class="catlab" text-anchor="middle">TREE</text>
  <rect class="cat" x="25" y="200" width="92" height="186" rx="6"/>
  <text x="71" y="297" class="catlab" text-anchor="middle">GRAPH</text>
  <rect class="cat" x="25" y="398" width="92" height="86" rx="6"/>
  <text x="71" y="437" class="catlab" text-anchor="middle">LINKED</text>
  <text x="71" y="452" class="catlab" text-anchor="middle">LIST</text>
  <rect class="cat" x="25" y="496" width="92" height="38" rx="6"/>
  <text x="71" y="519" class="catlab" text-anchor="middle">INTERVALS</text>
  <rect class="cat" x="25" y="546" width="92" height="38" rx="6"/>
  <text x="71" y="569" class="catlab" text-anchor="middle">WORDS</text>

  <g>
    <line class="edge" x1="117" y1="121" x2="135" y2="121"/>
    <text x="140" y="125" class="kw">answer PER LEVEL</text>
    <line class="arrow" x1="300" y1="121" x2="317" y2="121" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="103" width="168" height="36" rx="8"/>
    <text x="404" y="125" class="pillt" text-anchor="middle">BFS (queue)</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="169" x2="135" y2="169"/>
    <text x="140" y="173" class="kw">PATH / SUBTREE prop</text>
    <line class="arrow" x1="300" y1="169" x2="317" y2="169" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="151" width="168" height="36" rx="8"/>
    <text x="404" y="173" class="pillt" text-anchor="middle">DFS (recursion)</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="221" x2="135" y2="221"/>
    <text x="140" y="225" class="kw">WEIGHTED edges</text>
    <line class="arrow" x1="300" y1="221" x2="317" y2="221" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="203" width="168" height="36" rx="8"/>
    <text x="404" y="225" class="pillt" text-anchor="middle">Dijkstra</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="269" x2="135" y2="269"/>
    <text x="140" y="273" class="kw">DEPENDS ON / order</text>
    <line class="arrow" x1="300" y1="269" x2="317" y2="269" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="251" width="168" height="36" rx="8"/>
    <text x="404" y="273" class="pillt" text-anchor="middle">Topological Sort</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="317" x2="135" y2="317"/>
    <text x="140" y="321" class="kw">GROUPS / connected?</text>
    <line class="arrow" x1="300" y1="317" x2="317" y2="317" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="299" width="168" height="36" rx="8"/>
    <text x="404" y="321" class="pillt" text-anchor="middle">Union-Find</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="365" x2="135" y2="365"/>
    <text x="140" y="369" class="kw">1 STEP / grid, islands</text>
    <line class="arrow" x1="300" y1="365" x2="317" y2="365" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="347" width="168" height="36" rx="8"/>
    <text x="404" y="369" class="pillt" text-anchor="middle">BFS / DFS</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="419" x2="135" y2="419"/>
    <text x="140" y="423" class="kw">CYCLE / middle</text>
    <line class="arrow" x1="300" y1="419" x2="317" y2="419" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="401" width="168" height="36" rx="8"/>
    <text x="404" y="423" class="pillt" text-anchor="middle">Fast &amp; Slow ptr</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="467" x2="135" y2="467"/>
    <text x="140" y="471" class="kw">REORDER / remove</text>
    <line class="arrow" x1="300" y1="467" x2="317" y2="467" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="449" width="168" height="36" rx="8"/>
    <text x="404" y="471" class="pillt" text-anchor="middle">Reverse in-place</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="515" x2="135" y2="515"/>
    <text x="140" y="519" class="kw">[start, end] pairs</text>
    <line class="arrow" x1="300" y1="515" x2="317" y2="515" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="497" width="168" height="36" rx="8"/>
    <text x="404" y="519" class="pillt" text-anchor="middle">Intervals (sort)</text>
  </g>
  <g>
    <line class="edge" x1="117" y1="565" x2="135" y2="565"/>
    <text x="140" y="569" class="kw">prefix / autocomplete</text>
    <line class="arrow" x1="300" y1="565" x2="317" y2="565" marker-end="url(#arw)"/>
    <rect class="pill" x="320" y="547" width="168" height="36" rx="8"/>
    <text x="404" y="569" class="pillt" text-anchor="middle">Trie</text>
  </g>

  <!-- ================= PANEL 2 ================= -->
  <text x="630" y="88" class="phdr" font-size="13">(2) IF ARRAY / STRING — WHAT DOES IT ASK?</text>
  <rect class="cat" x="628" y="102" width="66" height="530" rx="6"/>
  <text x="661" y="367" class="catlab" text-anchor="middle" transform="rotate(-90 661 367)">ARRAY / STRING</text>

  <g>
    <line class="edge" x1="694" y1="121" x2="712" y2="121"/>
    <text x="717" y="125" class="kw">SORTED / condition flips</text>
    <line class="arrow" x1="900" y1="121" x2="917" y2="121" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="103" width="178" height="36" rx="8"/>
    <text x="1009" y="125" class="pillt" text-anchor="middle">Binary Search</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="169" x2="712" y2="169"/>
    <text x="717" y="173" class="kw">window · SUM+/- or COUNT</text>
    <line class="arrow" x1="900" y1="169" x2="917" y2="169" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="151" width="178" height="36" rx="8"/>
    <text x="1009" y="173" class="pillt" text-anchor="middle">Prefix Sum + Hash</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="217" x2="712" y2="217"/>
    <text x="717" y="221" class="kw">window · FIXED size k</text>
    <line class="arrow" x1="900" y1="217" x2="917" y2="217" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="199" width="178" height="36" rx="8"/>
    <text x="1009" y="221" class="pillt" text-anchor="middle">Sliding Window (fixed)</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="265" x2="712" y2="265"/>
    <text x="717" y="269" class="kw">window · LONGEST / SHORT</text>
    <line class="arrow" x1="900" y1="265" x2="917" y2="265" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="247" width="178" height="36" rx="8"/>
    <text x="1009" y="269" class="pillt" text-anchor="middle">Sliding Window (dyn)</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="313" x2="712" y2="313"/>
    <text x="717" y="317" class="kw">NEXT greater / smaller</text>
    <line class="arrow" x1="900" y1="313" x2="917" y2="313" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="295" width="178" height="36" rx="8"/>
    <text x="1009" y="317" class="pillt" text-anchor="middle">Monotonic Stack</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="361" x2="712" y2="361"/>
    <text x="717" y="365" class="kw">max/min of EVERY window</text>
    <line class="arrow" x1="900" y1="361" x2="917" y2="361" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="343" width="178" height="36" rx="8"/>
    <text x="1009" y="365" class="pillt" text-anchor="middle">Monotonic Deque</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="409" x2="712" y2="409"/>
    <text x="717" y="413" class="kw">SEEN? / how many?</text>
    <line class="arrow" x1="900" y1="409" x2="917" y2="409" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="391" width="178" height="36" rx="8"/>
    <text x="1009" y="413" class="pillt" text-anchor="middle">Hashing</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="457" x2="712" y2="457"/>
    <text x="717" y="461" class="kw">SUBSEQUENCE (can skip)</text>
    <line class="arrow" x1="900" y1="457" x2="917" y2="457" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="439" width="178" height="36" rx="8"/>
    <text x="1009" y="461" class="pillt" text-anchor="middle">DP</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="505" x2="712" y2="505"/>
    <text x="717" y="509" class="kw">return ALL / list every</text>
    <line class="arrow" x1="900" y1="505" x2="917" y2="505" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="487" width="178" height="36" rx="8"/>
    <text x="1009" y="509" class="pillt" text-anchor="middle">Backtracking</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="553" x2="712" y2="553"/>
    <text x="717" y="557" class="kw">OPTIMIZE + repeats</text>
    <line class="arrow" x1="900" y1="553" x2="917" y2="553" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="535" width="178" height="36" rx="8"/>
    <text x="1009" y="557" class="pillt" text-anchor="middle">DP</text>
  </g>
  <g>
    <line class="edge" x1="694" y1="601" x2="712" y2="601"/>
    <text x="717" y="605" class="kw">LOCAL safe choice</text>
    <line class="arrow" x1="900" y1="601" x2="917" y2="601" marker-end="url(#arw)"/>
    <rect class="pill" x="920" y="583" width="178" height="36" rx="8"/>
    <text x="1009" y="605" class="pillt" text-anchor="middle">Greedy</text>
  </g>

  <!-- ================= HINTS ================= -->
  <rect class="hintbox" x="25" y="655" width="1073" height="168" rx="8"/>
  <text x="42" y="680" class="hh">WATCH-OUTS — the splits that trip people up</text>
  <text x="42" y="706" class="ht"><tspan class="hk">Goal word is a decoy.</tspan>  "longest / min / max / count" says WHAT to return, never the pattern. Branch on structure + constraint.</text>
  <text x="42" y="730" class="ht"><tspan class="hk">Subarray SUM.</tspan>  negatives or "count subarrays" -> Prefix Sum + Hash    ·    all-positive &amp; min-length -> Sliding Window</text>
  <text x="42" y="754" class="ht"><tspan class="hk">Subsequence vs substring.</tspan>  can SKIP elements -> DP    ·    must be CONTIGUOUS (substring / subarray) -> Sliding Window</text>
  <text x="42" y="778" class="ht"><tspan class="hk">DP vs Greedy.</tspan>  same subproblem repeats when you recurse -> DP    ·    one local choice is always safe -> Greedy</text>
  <text x="42" y="802" class="ht"><tspan class="hk">Partition / coins.</tspan>  "return all" -> Backtracking    ·    "count ways" -> DP    ·    "fewest / min" -> DP-min</text>
</svg>
